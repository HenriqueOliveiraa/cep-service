version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: cepdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cepdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock
    ports:
      - "9090:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: --verbose

  cep-service:
    build: .
    container_name: cep-service
    depends_on:
      postgres:
        condition: service_healthy
      wiremock:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cepdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      CEP_API_URL: http://wiremock:8080
      TZ: America/Sao_Paulo

volumes:
  postgres_data: